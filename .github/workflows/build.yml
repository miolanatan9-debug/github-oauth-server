name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Dar permissao ao gradlew
        run: chmod +x gradlew

      - name: Build APK debug
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-1.0
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Criar Release automatica
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0-${{ github.run_number }}
          name: "Release v1.0 (build ${{ github.run_number }})"
          body: |
            APK gerado automaticamente pelo GitHub Actions.
            Pacote: com.example.app
            Build: ${{ github.run_number }}
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
